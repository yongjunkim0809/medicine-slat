<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보건실 위치 안내</title>
  <style>
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: rgb(185, 236, 245);
      padding: 15px;
      font-family: sans-serif;
    }

    
    #u {
      max-width: 100%;
      background: white;
      border: 2px solid black;
      text-align: center;
      padding: 20px 10px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    #u h1 {
      font-size: 24px;
      margin-bottom: 15px;
    }

   
    #u img {  
      width: 90%;     
      max-width: 400px;
      height: auto;    
      display: inline-block;
      border: 1px solid #ddd;
    }

    
    .deco-container {
      display: flex;
      justify-content: center; 
      align-items: center;
      gap: 40px; 
      margin: 20px 0;
    }

    
    .deco-img {
      width: 150px;         
      height: 150px;        
      object-fit: contain; 
    }

   
    .list {
      font-size: 18px; 
      font-weight: bold;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .list li {
      background-color: white;
      border: 2px solid black;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .list li:hover, .list li:active {
      background-color: #e0e0e0;
    }
  </style>
</head>
<body>

  <div id="u">
    <h1>보건실 위치</h1>
    <img src="학교안내도.png" alt="학교안내도"> 
  </div>

  <div class="deco-container">
    <img src="R.png" alt="빨간 캐릭터" class="deco-img">
    <img src="Y.png" alt="노란 캐릭터" class="deco-img">
  </div>

  <ul class="list">
    <li onclick="location.href='index.html'">메인화면</li>
    <li onclick="location.href='p1.html'">약찾기</li>
    <li onclick="location.href='page3.html'">약검색기</li>
  </ul>

</body>
</html>
